<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Citation XL/XLS Study Cards – Ch. 2–11 + Memory Items</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card-bg: #111827;
      --card-border: #1f2937;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.18);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --text-strong: #f9fafb;
      --danger: #f97373;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 26px 80px rgba(15, 23, 42, 0.85),
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 0 35px rgba(37, 99, 235, 0.25);
      padding: 20px 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(18px);
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 20px;
      font-weight: 640;
      letter-spacing: 0.03em;
      color: var(--text-strong);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .badge {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.25), transparent 55%);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #6ee7b7, #10b981);
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.85);
    }

    .card {
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 60%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 55%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.96));
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          135deg,
          rgba(148, 163, 184, 0.3),
          rgba(59, 130, 246, 0.16),
          rgba(148, 163, 184, 0.25)
        );
      mix-blend-mode: soft-light;
      opacity: 0.25;
      pointer-events: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      position: relative;
      z-index: 1;
      gap: 8px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #93c5fd;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .question-text {
      position: relative;
      z-index: 1;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    .question-highlight {
      font-weight: 600;
      color: var(--text-strong);
    }

    .options-list {
      position: relative;
      z-index: 1;
      margin-top: 4px;
      padding-left: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 15px;
      color: var(--text-main);
    }

    .options-list li {
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(31, 41, 55, 0.9);
    }

    .options-list li span {
      color: #d1d5db;
    }

    .options-list li.selectable {
      cursor: pointer;
      transition:
        background 0.12s ease,
        border-color 0.12s ease;
    }

    .options-list li.memory-recall-hint {
      list-style: none;
      color: var(--text-muted);
      font-style: italic;
      padding: 8px 0;
    }

    .options-list li.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .test-review-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 4px;
    }

    .test-review-item.correct {
      border-color: rgba(52, 211, 153, 0.7);
      background: rgba(16, 185, 129, 0.12);
    }

    .test-review-item.incorrect {
      border-color: rgba(248, 113, 113, 0.85);
      background: rgba(248, 113, 113, 0.1);
    }

    .test-review-item.unanswered {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(148, 163, 184, 0.08);
    }

    .review-actions {
      margin-top: 6px;
    }

    .review-actions button {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      cursor: pointer;
    }

    .review-actions button:hover {
      background: rgba(148, 163, 184, 0.15);
    }

    .review-actions button.flagged {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .review-header {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-strong);
    }

    .review-line {
      font-size: 13px;
      color: var(--text-main);
    }

    .answer-card {
      border-radius: 14px;
      border: 1px solid rgba(52, 211, 153, 0.35);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 55%),
        linear-gradient(145deg, rgba(6, 78, 59, 0.9), rgba(6, 95, 70, 0.9));
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .answer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #bbf7d0;
    }

    .answer-label {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
    }

    .answer-pill {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(74, 222, 128, 0.65);
      font-size: 11px;
      text-transform: uppercase;
    }

    .answer-main {
      font-size: 16px;
      font-weight: 600;
      color: #f0fdf4;
    }

    .answer-explanation {
      font-size: 14px;
      line-height: 1.5;
      color: #dcfce7;
    }

    .answer-hidden {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #bbf7d0;
    }

    .pill-muted {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px dashed rgba(74, 222, 128, 0.6);
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #111827;
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition:
        background 0.16s ease,
        border-color 0.16s ease,
        transform 0.08s ease,
        box-shadow 0.12s ease;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }

    button.primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: #3b82f6;
      color: #f9fafb;
      box-shadow:
        0 10px 25px rgba(37, 99, 235, 0.45),
        0 0 0 1px rgba(37, 99, 235, 0.65);
    }

    button.secondary {
      border-color: rgba(148, 163, 184, 0.6);
      background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.25), transparent 55%);
    }

    button.text {
      padding-inline: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
    }

    button:hover.primary {
      background: linear-gradient(135deg, #1d4ed8, #1d4ed8);
      transform: translateY(-1px);
    }

    button:hover.secondary {
      border-color: rgba(148, 163, 184, 0.9);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.32), transparent 60%);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    button.flagged {
      border-color: var(--danger);
      background: rgba(249, 115, 115, 0.15);
      color: #fca5a5;
    }

    button.flagged:hover {
      background: rgba(249, 115, 115, 0.25);
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
    }

    .mode-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .mode-button {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      padding: 3px 10px;
      font-size: 11px;
      background: transparent;
      color: var(--text-main);
    }

    .mode-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text-strong);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.5);
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .deck-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .deck-select {
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      padding: 4px 10px;
      font-size: 12px;
      outline: none;
      min-width: 180px;
    }
    .deck-select[multiple] {
      min-height: 100px;
    }

    .deck-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.7);
    }

    @media (max-width: 640px) {
      .app-container {
        padding: 16px 14px 14px;
      }
      .title {
        font-size: 17px;
      }
      .subtitle {
        font-size: 12px;
      }
      .controls {
        flex-direction: column;
        align-items: flex-start;
      }
      .btn-row {
        width: 100%;
      }
      .btn-row button {
        flex: 1;
        justify-content: center;
      }
      .controls-right {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="title-block">
        <div class="title">Citation XL/XLS – Study Cards</div>
        <div class="subtitle">Required Knowledge, Ch. 2, 5, 6, 7, 8</div>
      </div>
      <div class="badge">
        <span class="badge-dot"></span>
        <span id="badge-count">0 cards</span>
      </div>
    </header>

    <section class="card" aria-label="Question card">
      <div class="card-header">
        <div class="card-title" id="question-chapter">Ready</div>
        <div class="card-meta" id="question-meta">&nbsp;</div>
      </div>
      <div class="question-text" id="question-text">
        Click <span class="question-highlight">Next Question</span> to start studying.
      </div>
      <ul class="options-list" id="options-list"></ul>
    </section>

    <section class="answer-card" aria-label="Answer card">
      <div class="answer-header">
        <div class="answer-label">Answer</div>
        <div class="answer-pill" id="answer-pill">Hidden</div>
      </div>
      <div class="answer-main" id="answer-main">Press “Show Answer” when you’re ready.</div>
      <div class="answer-explanation" id="answer-explanation"></div>
    </section>

    <footer class="controls">
      <div class="btn-row">
        <button class="primary" id="btn-next">
          Next Question
        </button>
        <button class="secondary" id="btn-show">
          Show Answer
        </button>
        <button class="secondary" id="btn-flag">
          Mark Needs Review
        </button>
        <button class="secondary" id="btn-finish-test" style="display: none;">
          Finish Test
        </button>
      </div>
      <div class="controls-right">
        <div class="mode-toggle" aria-label="Mode selection">
          <span class="mode-label">Mode</span>
          <button type="button" class="mode-button active" id="btn-mode-study">Study</button>
          <button type="button" class="mode-button" id="btn-mode-test">Test</button>
        </div>
        <label class="deck-label">
          Decks (Ctrl/Cmd+click to select multiple):
          <select id="deck-select" class="deck-select" multiple size="10">
            <option value="all" selected>All (Ch. 2–12 + Req + Limits + Memory)</option>
            <option value="needs-review">Needs Review</option>
            <option value="req">Required Knowledge</option>
            <option value="limits">Limitations</option>
            <option value="memory">Memory Items</option>
            <option value="ch2">Chapter 2 – Electrical Power</option>
            <option value="ch3">Chapter 3 – Lighting</option>
            <option value="ch5">Chapter 5 – Fuel System</option>
            <option value="ch6">Chapter 6 – Auxiliary Power (APU)</option>
            <option value="ch7">Chapter 7 – Powerplant</option>
            <option value="ch8">Chapter 8 – Fire Protection</option>
            <option value="ch9">Chapter 9 – Pneumatics</option>
            <option value="ch10">Chapter 10 – Ice and Rain</option>
            <option value="ch11">Chapter 11 – Air Conditioning</option>
            <option value="ch12">Chapter 12 – Pressurization</option>
          </select>
        </label>
        <div class="status" id="status-text">Study mode – 0 / 0 cards reviewed this session.</div>
      </div>
    </footer>
  </div>

  <script>
    const questions = [
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 1,
    "prompt": "A fully charged battery should supply power to the BATTERY bus and the EMER buses for approximately:",
    "options": [
      "A. 2 hours",
      "B. 1 hour",
      "C. 30 minutes",
      "D. 10 minutes"
    ],
    "answer": "C – 30 minutes",
    "explanation": "With load shedding (only BATTERY and EMER bus items powered), the manual states the battery can power critical systems for **approximately 30 minutes**; if powering the entire electrical system, endurance would be only about 10 minutes."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 2,
    "prompt": "If the red BATT O’TEMP annunciator light segment flashes, the battery switch should be initially placed to _______ to isolate the battery from the generators and check for an amperage decrease.",
    "options": [
      "A. OFF",
      "B. EMER",
      "C. Either A or B",
      "D. None of the above"
    ],
    "answer": "B – EMER",
    "explanation": "Moving the BATT switch to **EMER** opens the battery isolation relay to the crossfeed bus, isolating the battery from the generators while still powering the EMER bus from the battery, allowing you to observe whether charging amperage decreases."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 3,
    "prompt": "Generators on-line, BATT switch ON, with the voltmeter selector switch remaining in BATT, the voltmeter gauge will indicate:",
    "options": [
      "A. Generator system voltage, 28.5 V, from the battery bus",
      "B. Generator system voltage, 28.5 V, from the crossfeed bus",
      "C. Battery voltage, 24–25 V, from the battery bus",
      "D. Battery voltage, 24–25 V, from the crossfeed bus"
    ],
    "answer": "A – Generator system voltage, 28.5 V, from the battery bus",
    "explanation": "With generators online and BATT **ON**, the BATTERY bus is at generator voltage (about **28.5 V**); with VOLTAGE SEL in BATT you are reading generator‑supplied battery bus voltage, not the battery’s own resting 24–25 V."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 4,
    "prompt": "Generators on line, BATT switch OFF, voltage selector BATT, the voltmeter gauge will indicate:",
    "options": [
      "A. 24–25 V",
      "B. 28.5 V",
      "C. No voltage",
      "D. None of the above"
    ],
    "answer": "C – No voltage",
    "explanation": "With the BATT switch **OFF**, the circuit between the BATTERY bus and the voltmeter is open; with VOLTAGE SEL at BATT the voltmeter reads **zero**, even if the generators are online."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 5,
    "prompt": "If the GEN OFF L annunciator segment illuminates:",
    "options": [
      "A. The right generator ammeter gauge should indicate double the previous load.",
      "B. The left generator amperage will drop to zero.",
      "C. The voltmeter should register zero with the voltmeter selector remaining in the BATT position.",
      "D. Both A and B."
    ],
    "answer": "D – Both A and B",
    "explanation": "When the left generator goes offline (GEN OFF L), its ammeter drops to **zero** and the **right generator load doubles**, assuming both 225‑amp current limiters are intact and the remaining generator now carries the full system load."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 6,
    "prompt": "If both GEN OFF L and R annunciator segments illuminate simultaneously:",
    "options": [
      "A. The MASTER CAUTION RESET lights will illuminate steady.",
      "B. The MASTER WARNING RESET lights will illuminate flashing.",
      "C. Both A and B.",
      "D. Only the GEN OFF L and R annunciator segments will flash."
    ],
    "answer": "C – Both A and B",
    "explanation": "Loss of **both** generators causes **GEN OFF L/R** to flash and illuminates both **MASTER CAUTION** and **MASTER WARNING** lights, as described in the monitoring section."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 7,
    "prompt": "If the AFT J-BOX-LMT annunciator segment illuminates, indicates:",
    "options": [
      "A. An aft J-Box 60 amp feed bus current limiter is open.",
      "B. An aft J-Box 225 amp feed bus current limiter is open.",
      "C. The generators should be selected OFF one at a time to determine which limiter is open.",
      "D. The aircraft should be landed as soon as possible."
    ],
    "answer": "B – An aft J-Box 225 amp feed bus current limiter is open",
    "explanation": "The **AFT J‑BOX LMT** segment monitors the **225‑amp current limiters** between the FEED buses and the CROSSFEED bus; illumination (flashing) indicates one of these high‑current limiters is open."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 8,
    "prompt": "If both generators have tripped off line and unable to reset, and the BATT switch is placed in EMER, the following equipment is inoperative:",
    "options": [
      "A. Standby HSI",
      "B. Normal extension of the landing gear",
      "C. Ignition",
      "D. Speedbrakes"
    ],
    "answer": "D – Speedbrakes",
    "explanation": "With both generators failed and BATT in **EMER**, the EMER and BATTERY buses power only selected critical instruments and controls to safely land (e.g., gear extension and ignition remain available); **speedbrakes** are not essential and are not powered in this configuration."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 9,
    "prompt": "Aircraft configuration same as question 8, select correct choice:",
    "options": [
      "A. Only the standby radio control head will be operational for air-to-ground communications.",
      "B. AHRS 2 supplies heading information to the standby HSI.",
      "C. AHRS 1 supplies heading information to the standby HSI.",
      "D. The secondary flight display may be used for an ILS approach (APR switch depressed)."
    ],
    "answer": "C – AHRS 1 supplies heading information to the standby HSI",
    "explanation": "In EMER power, the standby HSI remains powered and uses **AHRS 1** as its heading source; RMU 1 is also powered from EMER buses, but AHRS 1 is the designated input to the standby HSI."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 10,
    "prompt": "If the battery overtemps and cannot be isolated, battery isolation relay stuck closed:",
    "options": [
      "A. Turn the BATT switch OFF and land as soon as practical.",
      "B. Activate the BATTERY DISCONNECT switch.",
      "C. After performing choice B, if the BATT O’TEMP>160° annunciator segment begins to flash, land as soon as possible.",
      "D. Both B and C."
    ],
    "answer": "D – Both B and C",
    "explanation": "If the battery cannot be isolated via the BATT switch (battery isolation relay stuck), you must use the **BATTERY DISCONNECT** switch to remove it from the system. If after that the **BATT O’TEMP >160°** segment flashes, the condition requires landing **as soon as possible**."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 11,
    "prompt": "Select the correct statement concerning the use of a ground power unit:",
    "options": [
      "A. Never connect the power cord to or remove it from the aircraft with power applied.",
      "B. The battery will not receive a charge if the BATT switch is ON.",
      "C. The GEN switches are placed in the OFF position for an engine start using the GPU.",
      "D. The GPU ground unit must be regulated at 24 volts, and 800/1,000 amps."
    ],
    "answer": "C – The GEN switches are placed in the OFF position for an engine start using the GPU",
    "explanation": "The manual specifies GEN switches are **ON** for normal engine starts and **OFF** when a GPU is used. It also states the GPU should be **regulated to 28 V** with 800–1000 A capability; statement D’s 24 V is incorrect, and statement B contradicts the note that the GPU will charge the battery regardless of BATT switch position."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 12,
    "prompt": "The standby flight display emergency power system powers:",
    "options": [
      "A. The pilot PFD with the battery switch set to EMER.",
      "B. The standby HSI back lighting.",
      "C. The standby flight display.",
      "D. Both B and C."
    ],
    "answer": "C – The standby flight display",
    "explanation": "The left nose emergency battery pack is a dedicated backup power source for the **secondary/standby flight display (SFD)** only; it does not power the pilot PFD or the standby HSI lighting."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 13,
    "prompt": "Selecting EMER with the BATT switch:",
    "options": [
      "A. Will allow the CROSSFEED bus to power all emergency systems.",
      "B. Will render the voltmeter inoperative.",
      "C. The battery will still receive a charge from the generators.",
      "D. Allows only the EMER and BATTERY bus items to be powered."

    const chapterEl = document.getElementById("question-chapter");
    const metaEl = document.getElementById("question-meta");
    const questionTextEl = document.getElementById("question-text");
    const optionsListEl = document.getElementById("options-list");
    const answerPillEl = document.getElementById("answer-pill");
    const answerMainEl = document.getElementById("answer-main");
    const answerExplanationEl = document.getElementById("answer-explanation");
    const badgeCountEl = document.getElementById("badge-count");
    const statusTextEl = document.getElementById("status-text");

    const btnNext = document.getElementById("btn-next");
    const btnShow = document.getElementById("btn-show");
    const btnFlag = document.getElementById("btn-flag");
    const btnFinishTest = document.getElementById("btn-finish-test");
    const deckSelect = document.getElementById("deck-select");
    const btnModeStudy = document.getElementById("btn-mode-study");
    const btnModeTest = document.getElementById("btn-mode-test");

    const NEEDS_REVIEW_KEY = "citation-xl-needs-review";

    let mode = "study"; // "study" | "test"

    let currentQuestion = null;
    let seenCount = 0;
    let roundQuestions = [];
    let roundIndex = 0;

    // Test mode state
    let isTestActive = false;
    let testQuestions = [];
    let testIndex = 0;
    let testAnswers = [];
    let currentTestQuestionIndex = -1;

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getCardId(q) {
      return q.chapter + "|" + q.number;
    }

    function getFlaggedIds() {
      try {
        const raw = localStorage.getItem(NEEDS_REVIEW_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (_) {
        return [];
      }
    }

    function setFlaggedIds(ids) {
      localStorage.setItem(NEEDS_REVIEW_KEY, JSON.stringify(ids));
    }

    function getSelectedDecks() {
      const opts = Array.from(deckSelect.selectedOptions).map((o) => o.value);
      return opts.length ? opts : ["all"];
    }

    function buildTestPool() {
      const selected = getSelectedDecks();
      let base;

      if (selected.includes("all") || !selected.length) {
        base = questions.slice();
      } else {
        base = getActiveQuestions();
      }
      const pool = shuffle(base);
      if (selected.includes("all") && pool.length > 50) {
        return pool.slice(0, 50);
      }
      return pool;
    }

    function getActiveQuestions() {
      const selected = getSelectedDecks();
      const flaggedIds = new Set(getFlaggedIds());

      if (selected.includes("needs-review")) {
        return questions.filter((q) => flaggedIds.has(getCardId(q)));
      }
      if (selected.includes("all")) {
        return questions;
      }
      return questions.filter((q) => {
        if (selected.includes("req") && q.chapter.startsWith("Required Knowledge")) return true;
        if (selected.includes("limits") && q.chapter.startsWith("Limitations")) return true;
        if (selected.includes("memory") && q.chapter.startsWith("Memory Items")) return true;
        if (selected.includes("ch2") && q.chapter.startsWith("Chapter 2")) return true;
        if (selected.includes("ch3") && q.chapter.startsWith("Chapter 3")) return true;
        if (selected.includes("ch5") && q.chapter.startsWith("Chapter 5")) return true;
        if (selected.includes("ch6") && q.chapter.startsWith("Chapter 6")) return true;
        if (selected.includes("ch7") && q.chapter.startsWith("Chapter 7")) return true;
        if (selected.includes("ch8") && q.chapter.startsWith("Chapter 8")) return true;
        if (selected.includes("ch9") && q.chapter.startsWith("Chapter 9")) return true;
        if (selected.includes("ch10") && q.chapter.startsWith("Chapter 10")) return true;
        if (selected.includes("ch11") && q.chapter.startsWith("Chapter 11")) return true;
        if (selected.includes("ch12") && q.chapter.startsWith("Chapter 12")) return true;
        return false;
      });
    }

    function renderQuestion(q) {
      chapterEl.textContent = q.chapter;
      if (mode === "test" && isTestActive && testQuestions.length > 0 && currentTestQuestionIndex >= 0) {
        metaEl.textContent = `Question ${currentTestQuestionIndex + 1} of ${testQuestions.length}`;
      } else {
        metaEl.textContent = `Question ${q.number}`;
      }

      const promptHtml = q.prompt;
      questionTextEl.textContent = promptHtml;

      optionsListEl.innerHTML = "";
      if (q.options && q.options.length > 0) {
        q.options.forEach((opt, idx) => {
          const li = document.createElement("li");
          const span = document.createElement("span");
          span.textContent = opt;
          li.appendChild(span);

          if (mode === "test" && isTestActive && currentTestQuestionIndex >= 0) {
            li.classList.add("selectable");
            li.tabIndex = 0;
            const selectThis = () => {
              testAnswers[currentTestQuestionIndex] = idx;
              Array.from(optionsListEl.children).forEach((el) =>
                el.classList.remove("selected")
              );
              li.classList.add("selected");
            };
            li.onclick = selectThis;
            li.onkeydown = (evt) => {
              if (evt.key === "Enter" || evt.key === " ") {
                evt.preventDefault();
                selectThis();
              }
            };

            if (testAnswers[currentTestQuestionIndex] === idx) {
              li.classList.add("selected");
            }
          }

          optionsListEl.appendChild(li);
        });
      } else {
        // Memory Items: recall-style card (no multiple choice)
        const li = document.createElement("li");
        li.classList.add("memory-recall-hint");
        li.textContent = "Recall the required action, then tap “Show Answer”.";
        optionsListEl.appendChild(li);
      }
    }

    function hideAnswer() {
      if (mode === "test" && isTestActive) {
        answerPillEl.textContent = "Hidden (Test Mode)";
        answerMainEl.textContent =
          "Answers and explanations will be shown at the end of the test.";
        answerExplanationEl.textContent = "";
      } else {
        answerPillEl.textContent = "Hidden";
        answerMainEl.textContent = "Press “Show Answer” when you’re ready.";
        answerExplanationEl.textContent = "";
      }
    }

    function showAnswer() {
      if (mode === "test") return;
      if (currentQuestion === null) return;
      answerPillEl.textContent = "Revealed";
      if (currentQuestion.chapter.startsWith("Memory Items")) {
        // Show all steps for this procedure in order
        const procedureSteps = questions
          .filter((q) => q.chapter === currentQuestion.chapter)
          .sort((a, b) => {
            const na = parseInt(a.number, 10) || 0;
            const nb = parseInt(b.number, 10) || 0;
            return na - nb;
          });
        const stepLines = procedureSteps.map((q) => {
          const answerText = q.answer.replace(/^[A-D]\s*–\s*/i, "").trim();
          return `Step ${q.number}: ${answerText}`;
        });
        answerMainEl.textContent = stepLines.join("\n");
        answerExplanationEl.textContent = currentQuestion.explanation;
      } else {
        answerMainEl.textContent = currentQuestion.answer;
        answerExplanationEl.textContent = currentQuestion.explanation;
      }
    }

    function handleStudyNext() {
      if (roundQuestions.length === 0 || roundIndex >= roundQuestions.length) {
        const active = getActiveQuestions();
        if (!active.length) return;
        roundQuestions = shuffle(active.slice());
        roundIndex = 0;
      }
      currentQuestion = roundQuestions[roundIndex];
      roundIndex += 1;
      renderQuestion(currentQuestion);
      hideAnswer();
      seenCount += 1;
      updateStatus();
      updateFlagButton();
    }

    function handleTestNext() {
      if (!isTestActive) {
        testQuestions = buildTestPool();
        if (!testQuestions.length) return;
        testAnswers = new Array(testQuestions.length).fill(null);
        testIndex = 0;
        isTestActive = true;
      }

      if (testIndex >= testQuestions.length) {
        finishTest();
        return;
      }

      currentTestQuestionIndex = testIndex;
      currentQuestion = testQuestions[testIndex];
      testIndex += 1;

      renderQuestion(currentQuestion);
      hideAnswer();
      updateStatus();
      updateFlagButton();

      if (testIndex >= testQuestions.length) {
        btnNext.textContent = "Finish Test";
      } else {
        btnNext.textContent = "Next Question";
      }
    }

    function nextQuestion() {
      if (mode === "test") {
        handleTestNext();
      } else {
        handleStudyNext();
      }
    }

    function updateFinishTestButton() {
      btnFinishTest.style.display = mode === "test" && isTestActive ? "" : "none";
    }

    function updateStatus() {
      const active = getActiveQuestions();
      badgeCountEl.textContent = `${active.length} cards`;

      if (mode === "test") {
        if (!isTestActive || !testQuestions.length) {
          statusTextEl.textContent = "Test mode – test not started.";
        } else if (currentTestQuestionIndex >= 0) {
          statusTextEl.textContent = `Test mode – Question ${currentTestQuestionIndex + 1} of ${testQuestions.length}.`;
        } else {
          statusTextEl.textContent = `Test mode – ${testQuestions.length} questions in this test.`;
        }
      } else {
        statusTextEl.textContent = `Study mode – ${seenCount} / ${active.length} cards reviewed this session.`;
      }
      updateFinishTestButton();
    }

    function updateFlagButton() {
      if (currentQuestion === null) {
        btnFlag.textContent = "Mark Needs Review";
        btnFlag.classList.remove("flagged");
        return;
      }
      const flagged = new Set(getFlaggedIds());
      const isFlagged = flagged.has(getCardId(currentQuestion));
      btnFlag.textContent = isFlagged ? "Unflag (Needs Review)" : "Mark Needs Review";
      btnFlag.classList.toggle("flagged", isFlagged);
    }

    function toggleFlag() {
      if (currentQuestion === null) return;
      toggleFlagForQuestion(currentQuestion);
      updateFlagButton();
      updateStatus();
    }

    function toggleFlagForQuestion(q) {
      const id = getCardId(q);
      const ids = getFlaggedIds();
      const set = new Set(ids);
      if (set.has(id)) {
        set.delete(id);
      } else {
        set.add(id);
      }
      setFlaggedIds(Array.from(set));
    }

    function finishTest() {
      isTestActive = false;
      btnFinishTest.style.display = "none";

      let correct = 0;
      let answeredCount = 0;

      testQuestions.forEach((q, i) => {
        const chosenIdx = testAnswers[i];
        if (chosenIdx == null) return;

        answeredCount += 1;
        const chosenLetter = q.options[chosenIdx].trim().charAt(0);
        const correctLetter = q.answer.trim().charAt(0);
        if (chosenLetter === correctLetter) {
          correct += 1;
        }
      });

      const total = answeredCount;
      const percent = total ? Math.round((correct / total) * 100) : 0;

      chapterEl.textContent = "Test Results";
      metaEl.textContent = "";
      if (total === 0) {
        questionTextEl.textContent = "No questions were answered. Start a new test when ready.";
      } else {
        questionTextEl.textContent = `You answered ${correct} out of ${total} questions correctly (${percent}%). Scroll below to review each question.`;
      }

      optionsListEl.innerHTML = "";

      testQuestions.forEach((q, i) => {
        const li = document.createElement("li");
        li.classList.add("test-review-item");

        const chosenIdx = testAnswers[i];
        const chosenText =
          q.options && chosenIdx != null ? q.options[chosenIdx] : null;

        const correctLetter = q.answer.trim().charAt(0);
        const correctOption =
          q.options && q.options.length
            ? (q.options.find((opt) => opt.trim().startsWith(correctLetter + ".")) || q.answer)
            : q.answer;

        const isCorrect =
          q.options && q.options.length
            ? chosenIdx != null && chosenText && chosenText.trim().charAt(0) === correctLetter
            : false;
        const isUnanswered = chosenIdx == null;

        li.classList.add(isUnanswered ? "unanswered" : isCorrect ? "correct" : "incorrect");

        const header = document.createElement("div");
        header.className = "review-header";
        header.textContent = `Q${i + 1}: ${q.prompt}`;

        const yourLine = document.createElement("div");
        yourLine.className = "review-line";
        if (chosenIdx == null) {
          yourLine.innerHTML = "Your answer: <em>No answer selected</em>";
        } else {
          yourLine.textContent = `Your answer: ${chosenText}`;
        }

        const correctLine = document.createElement("div");
        correctLine.className = "review-line";
        correctLine.textContent = `Correct answer: ${correctOption}`;

        const actions = document.createElement("div");
        actions.className = "review-actions";
        const flagBtn = document.createElement("button");
        const updateFlagBtn = () => {
          const flagged = new Set(getFlaggedIds()).has(getCardId(q));
          flagBtn.textContent = flagged ? "Unflag (Needs Review)" : "Mark Needs Review";
          flagBtn.classList.toggle("flagged", flagged);
        };
        flagBtn.addEventListener("click", () => {
          toggleFlagForQuestion(q);
          updateFlagBtn();
          updateStatus();
        });
        updateFlagBtn();
        actions.appendChild(flagBtn);

        li.appendChild(header);
        li.appendChild(yourLine);
        li.appendChild(correctLine);
        li.appendChild(actions);

        optionsListEl.appendChild(li);
      });

      answerPillEl.textContent = "Completed";
      answerMainEl.textContent = total === 0
        ? "No answers submitted"
        : `Score: ${correct}/${total} (${percent}%)`;
      answerExplanationEl.textContent =
        "Green = correct, red = incorrect, gray = skipped. Use Study mode and the Needs Review deck to focus on any missed areas.";

      btnNext.textContent = "Start New Test";
      updateStatus();
    }

    function setMode(newMode) {
      if (mode === newMode) return;
      mode = newMode;

      // Reset shared state
      currentQuestion = null;
      roundQuestions = [];
      roundIndex = 0;
      seenCount = 0;

      // Reset test state
      isTestActive = false;
      testQuestions = [];
      testAnswers = [];
      testIndex = 0;
      currentTestQuestionIndex = -1;

      updateFinishTestButton();
      if (mode === "study") {
        btnModeStudy.classList.add("active");
        btnModeTest.classList.remove("active");
        btnNext.textContent = "Next Question";
        btnShow.disabled = false;
        chapterEl.textContent = "Ready";
        metaEl.textContent = "\u00a0";
        questionTextEl.innerHTML =
          'Study mode. Click <span class="question-highlight">Next Question</span> to start.';
      } else {
        btnModeStudy.classList.remove("active");
        btnModeTest.classList.add("active");
        btnNext.textContent = "Start Test";
        btnShow.disabled = true;
        chapterEl.textContent = "Test Mode";
        metaEl.textContent = "\u00a0";
        questionTextEl.textContent =
          "Select decks, then click “Start Test” to begin. Answers are hidden until the end of the test.";
      }

      optionsListEl.innerHTML = "";
      hideAnswer();
      updateStatus();
      updateFlagButton();
    }

    btnNext.addEventListener("click", nextQuestion);
    btnShow.addEventListener("click", showAnswer);
    btnFlag.addEventListener("click", toggleFlag);
    btnFinishTest.addEventListener("click", finishTest);

    btnModeStudy.addEventListener("click", () => setMode("study"));
    btnModeTest.addEventListener("click", () => setMode("test"));

    deckSelect.addEventListener("change", () => {
      currentQuestion = null;
      roundQuestions = [];
      roundIndex = 0;
      seenCount = 0;

      isTestActive = false;
      testQuestions = [];
      testAnswers = [];
      testIndex = 0;
      currentTestQuestionIndex = -1;

      updateFinishTestButton();
      if (mode === "test") {
        chapterEl.textContent = "Test Mode";
        metaEl.textContent = "\u00a0";
        questionTextEl.textContent =
          "Deck changed. Click “Start Test” to generate a new test.";
        btnNext.textContent = "Start Test";
      } else {
        chapterEl.textContent = "Ready";
        metaEl.textContent = "\u00a0";
        questionTextEl.innerHTML =
          'Deck changed. Click <span class="question-highlight">Next Question</span> to start.';
        btnNext.textContent = "Next Question";
      }

      optionsListEl.innerHTML = "";
      hideAnswer();
      updateStatus();
      updateFlagButton();
    });

    // Initial state
    updateStatus();
  </script>
</body>
</html>
