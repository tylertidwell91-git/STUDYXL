<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Citation XL/XLS Study Cards – Ch. 2 & 5</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card-bg: #111827;
      --card-border: #1f2937;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.18);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --text-strong: #f9fafb;
      --danger: #f97373;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.98));
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 26px 80px rgba(15, 23, 42, 0.85),
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 0 35px rgba(37, 99, 235, 0.25);
      padding: 20px 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(18px);
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: 20px;
      font-weight: 640;
      letter-spacing: 0.03em;
      color: var(--text-strong);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .badge {
      font-size: 11px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.25), transparent 55%);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #6ee7b7, #10b981);
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.85);
    }

    .card {
      border-radius: 14px;
      border: 1px solid var(--card-border);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 60%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 55%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.96));
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          135deg,
          rgba(148, 163, 184, 0.3),
          rgba(59, 130, 246, 0.16),
          rgba(148, 163, 184, 0.25)
        );
      mix-blend-mode: soft-light;
      opacity: 0.25;
      pointer-events: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      position: relative;
      z-index: 1;
      gap: 8px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #93c5fd;
    }

    .card-meta {
      font-size: 13px;
      color: var(--text-muted);
    }

    .question-text {
      position: relative;
      z-index: 1;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    .question-highlight {
      font-weight: 600;
      color: var(--text-strong);
    }

    .options-list {
      position: relative;
      z-index: 1;
      margin-top: 4px;
      padding-left: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 15px;
      color: var(--text-main);
    }

    .options-list li {
      padding: 5px 8px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(31, 41, 55, 0.9);
    }

    .options-list li span {
      color: #d1d5db;
    }

    .answer-card {
      border-radius: 14px;
      border: 1px solid rgba(52, 211, 153, 0.35);
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 55%),
        linear-gradient(145deg, rgba(6, 78, 59, 0.9), rgba(6, 95, 70, 0.9));
      padding: 12px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .answer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #bbf7d0;
    }

    .answer-label {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
    }

    .answer-pill {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(74, 222, 128, 0.65);
      font-size: 11px;
      text-transform: uppercase;
    }

    .answer-main {
      font-size: 16px;
      font-weight: 600;
      color: #f0fdf4;
    }

    .answer-explanation {
      font-size: 14px;
      line-height: 1.5;
      color: #dcfce7;
    }

    .answer-hidden {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #bbf7d0;
    }

    .pill-muted {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px dashed rgba(74, 222, 128, 0.6);
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #111827;
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition:
        background 0.16s ease,
        border-color 0.16s ease,
        transform 0.08s ease,
        box-shadow 0.12s ease;
    }

    button.primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: #3b82f6;
      color: #f9fafb;
      box-shadow:
        0 10px 25px rgba(37, 99, 235, 0.45),
        0 0 0 1px rgba(37, 99, 235, 0.65);
    }

    button.secondary {
      border-color: rgba(148, 163, 184, 0.6);
      background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.25), transparent 55%);
    }

    button.text {
      padding-inline: 8px;
      border: none;
      background: transparent;
      color: var(--text-muted);
    }

    button:hover.primary {
      background: linear-gradient(135deg, #1d4ed8, #1d4ed8);
      transform: translateY(-1px);
    }

    button:hover.secondary {
      border-color: rgba(148, 163, 184, 0.9);
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.32), transparent 60%);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .status {
      font-size: 13px;
      color: var(--text-muted);
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .deck-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .deck-select {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      padding: 4px 10px;
      font-size: 12px;
      outline: none;
    }

    .deck-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.7);
    }

    @media (max-width: 640px) {
      .app-container {
        padding: 16px 14px 14px;
      }
      .title {
        font-size: 17px;
      }
      .subtitle {
        font-size: 12px;
      }
      .controls {
        flex-direction: column;
        align-items: flex-start;
      }
      .btn-row {
        width: 100%;
      }
      .btn-row button {
        flex: 1;
        justify-content: center;
      }
      .controls-right {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="title-block">
        <div class="title">Citation XL/XLS – Study Cards</div>
        <div class="subtitle">Required Knowledge, Ch. 2, 5, 6, 7, 8</div>
      </div>
      <div class="badge">
        <span class="badge-dot"></span>
        <span id="badge-count">0 cards</span>
      </div>
    </header>

    <section class="card" aria-label="Question card">
      <div class="card-header">
        <div class="card-title" id="question-chapter">Ready</div>
        <div class="card-meta" id="question-meta">&nbsp;</div>
      </div>
      <div class="question-text" id="question-text">
        Click <span class="question-highlight">Next Question</span> to start studying.
      </div>
      <ul class="options-list" id="options-list"></ul>
    </section>

    <section class="answer-card" aria-label="Answer card">
      <div class="answer-header">
        <div class="answer-label">Answer</div>
        <div class="answer-pill" id="answer-pill">Hidden</div>
      </div>
      <div class="answer-main" id="answer-main">Press “Show Answer” when you’re ready.</div>
      <div class="answer-explanation" id="answer-explanation"></div>
    </section>

    <footer class="controls">
      <div class="btn-row">
        <button class="primary" id="btn-next">
          Next Question
        </button>
        <button class="secondary" id="btn-show">
          Show Answer
        </button>
        <button class="secondary" id="btn-flag">
          Mark Needs Review
        </button>
      </div>
      <div class="controls-right">
        <label class="deck-label">
          Deck:
          <select id="deck-select" class="deck-select" multiple>
            <option value="all">All (Req + Ch. 2, 5, 6, 7, 8)</option>
            <option value="req">Required Knowledge</option>
            <option value="ch2">Chapter 2 – Electrical Power</option>
            <option value="ch5">Chapter 5 – Fuel System</option>
            <option value="ch6">Chapter 6 – Auxiliary Power (APU)</option>
            <option value="ch7">Chapter 7 – Powerplant</option>
            <option value="ch8">Chapter 8 – Fire Protection</option>
          </select>
        </label>
        <div class="status" id="status-text">0 / 0 cards reviewed in this session.</div>
      </div>
    </footer>
  </div>

  <script>
    const questions = [
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 1,
    "prompt": "A fully charged battery should supply power to the BATTERY bus and the EMER buses for approximately:",
    "options": [
      "A. 2 hours",
      "B. 1 hour",
      "C. 30 minutes",
      "D. 10 minutes"
    ],
    "answer": "C – 30 minutes",
    "explanation": "With load shedding (only BATTERY and EMER bus items powered), the manual states the battery can power critical systems for **approximately 30 minutes**; if powering the entire electrical system, endurance would be only about 10 minutes."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 2,
    "prompt": "If the red BATT O’TEMP annunciator light segment flashes, the battery switch should be initially placed to _______ to isolate the battery from the generators and check for an amperage decrease.",
    "options": [
      "A. OFF",
      "B. EMER",
      "C. Either A or B",
      "D. None of the above"
    ],
    "answer": "B – EMER",
    "explanation": "Moving the BATT switch to **EMER** opens the battery isolation relay to the crossfeed bus, isolating the battery from the generators while still powering the EMER bus from the battery, allowing you to observe whether charging amperage decreases."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 3,
    "prompt": "Generators on-line, BATT switch ON, with the voltmeter selector switch remaining in BATT, the voltmeter gauge will indicate:",
    "options": [
      "A. Generator system voltage, 28.5 V, from the battery bus",
      "B. Generator system voltage, 28.5 V, from the crossfeed bus",
      "C. Battery voltage, 24–25 V, from the battery bus",
      "D. Battery voltage, 24–25 V, from the crossfeed bus"
    ],
    "answer": "A – Generator system voltage, 28.5 V, from the battery bus",
    "explanation": "With generators online and BATT **ON**, the BATTERY bus is at generator voltage (about **28.5 V**); with VOLTAGE SEL in BATT you are reading generator‑supplied battery bus voltage, not the battery’s own resting 24–25 V."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 4,
    "prompt": "Generators on line, BATT switch OFF, voltage selector BATT, the voltmeter gauge will indicate:",
    "options": [
      "A. 24–25 V",
      "B. 28.5 V",
      "C. No voltage",
      "D. None of the above"
    ],
    "answer": "C – No voltage",
    "explanation": "With the BATT switch **OFF**, the circuit between the BATTERY bus and the voltmeter is open; with VOLTAGE SEL at BATT the voltmeter reads **zero**, even if the generators are online."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 5,
    "prompt": "If the GEN OFF L annunciator segment illuminates:",
    "options": [
      "A. The right generator ammeter gauge should indicate double the previous load.",
      "B. The left generator amperage will drop to zero.",
      "C. The voltmeter should register zero with the voltmeter selector remaining in the BATT position.",
      "D. Both A and B."
    ],
    "answer": "D – Both A and B",
    "explanation": "When the left generator goes offline (GEN OFF L), its ammeter drops to **zero** and the **right generator load doubles**, assuming both 225‑amp current limiters are intact and the remaining generator now carries the full system load."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 6,
    "prompt": "If both GEN OFF L and R annunciator segments illuminate simultaneously:",
    "options": [
      "A. The MASTER CAUTION RESET lights will illuminate steady.",
      "B. The MASTER WARNING RESET lights will illuminate flashing.",
      "C. Both A and B.",
      "D. Only the GEN OFF L and R annunciator segments will flash."
    ],
    "answer": "C – Both A and B",
    "explanation": "Loss of **both** generators causes **GEN OFF L/R** to flash and illuminates both **MASTER CAUTION** and **MASTER WARNING** lights, as described in the monitoring section."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 7,
    "prompt": "If the AFT J-BOX-LMT annunciator segment illuminates, indicates:",
    "options": [
      "A. An aft J-Box 60 amp feed bus current limiter is open.",
      "B. An aft J-Box 225 amp feed bus current limiter is open.",
      "C. The generators should be selected OFF one at a time to determine which limiter is open.",
      "D. The aircraft should be landed as soon as possible."
    ],
    "answer": "B – An aft J-Box 225 amp feed bus current limiter is open",
    "explanation": "The **AFT J‑BOX LMT** segment monitors the **225‑amp current limiters** between the FEED buses and the CROSSFEED bus; illumination (flashing) indicates one of these high‑current limiters is open."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 8,
    "prompt": "If both generators have tripped off line and unable to reset, and the BATT switch is placed in EMER, the following equipment is inoperative:",
    "options": [
      "A. Standby HSI",
      "B. Normal extension of the landing gear",
      "C. Ignition",
      "D. Speedbrakes"
    ],
    "answer": "D – Speedbrakes",
    "explanation": "With both generators failed and BATT in **EMER**, the EMER and BATTERY buses power only selected critical instruments and controls to safely land (e.g., gear extension and ignition remain available); **speedbrakes** are not essential and are not powered in this configuration."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 9,
    "prompt": "Aircraft configuration same as question 8, select correct choice:",
    "options": [
      "A. Only the standby radio control head will be operational for air-to-ground communications.",
      "B. AHRS 2 supplies heading information to the standby HSI.",
      "C. AHRS 1 supplies heading information to the standby HSI.",
      "D. The secondary flight display may be used for an ILS approach (APR switch depressed)."
    ],
    "answer": "C – AHRS 1 supplies heading information to the standby HSI",
    "explanation": "In EMER power, the standby HSI remains powered and uses **AHRS 1** as its heading source; RMU 1 is also powered from EMER buses, but AHRS 1 is the designated input to the standby HSI."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 10,
    "prompt": "If the battery overtemps and cannot be isolated, battery isolation relay stuck closed:",
    "options": [
      "A. Turn the BATT switch OFF and land as soon as practical.",
      "B. Activate the BATTERY DISCONNECT switch.",
      "C. After performing choice B, if the BATT O’TEMP>160° annunciator segment begins to flash, land as soon as possible.",
      "D. Both B and C."
    ],
    "answer": "D – Both B and C",
    "explanation": "If the battery cannot be isolated via the BATT switch (battery isolation relay stuck), you must use the **BATTERY DISCONNECT** switch to remove it from the system. If after that the **BATT O’TEMP >160°** segment flashes, the condition requires landing **as soon as possible**."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 11,
    "prompt": "Select the correct statement concerning the use of a ground power unit:",
    "options": [
      "A. Never connect the power cord to or remove it from the aircraft with power applied.",
      "B. The battery will not receive a charge if the BATT switch is ON.",
      "C. The GEN switches are placed in the OFF position for an engine start using the GPU.",
      "D. The GPU ground unit must be regulated at 24 volts, and 800/1,000 amps."
    ],
    "answer": "C – The GEN switches are placed in the OFF position for an engine start using the GPU",
    "explanation": "The manual specifies GEN switches are **ON** for normal engine starts and **OFF** when a GPU is used. It also states the GPU should be **regulated to 28 V** with 800–1000 A capability; statement D’s 24 V is incorrect, and statement B contradicts the note that the GPU will charge the battery regardless of BATT switch position."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 12,
    "prompt": "The standby flight display emergency power system powers:",
    "options": [
      "A. The pilot PFD with the battery switch set to EMER.",
      "B. The standby HSI back lighting.",
      "C. The standby flight display.",
      "D. Both B and C."
    ],
    "answer": "C – The standby flight display",
    "explanation": "The left nose emergency battery pack is a dedicated backup power source for the **secondary/standby flight display (SFD)** only; it does not power the pilot PFD or the standby HSI lighting."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 13,
    "prompt": "Selecting EMER with the BATT switch:",
    "options": [
      "A. Will allow the CROSSFEED bus to power all emergency systems.",
      "B. Will render the voltmeter inoperative.",
      "C. The battery will still receive a charge from the generators.",
      "D. Allows only the EMER and BATTERY bus items to be powered."
    ],
    "answer": "D – Allows only the EMER and BATTERY bus items to be powered",
    "explanation": "With BATT in **EMER**, the EMER PWR relays reconfigure so that the **BATTERY bus powers the EMER bus**, and the battery isolation relay opens to the crossfeed bus. In this configuration only **BATTERY bus and EMER bus** loads are powered, and the battery is no longer being charged by the generators."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 14,
    "prompt": "By activating the INTERIOR MASTER switch:",
    "options": [
      "A. The cabin light switches are disabled.",
      "B. Turns on all of the reading lights.",
      "C. Removes all power from the cabin, aft of the cockpit.",
      "D. Removes all interior power from the aircraft."
    ],
    "answer": "C – Removes all power from the cabin, aft of the cockpit",
    "explanation": "The INTERIOR MASTER switch opens the interior master relay on the RH feed bus and **removes electrical power to the cabin area**, not the cockpit."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 15,
    "prompt": "Which interior lights may be turned on with the BATT and GEN switches OFF?",
    "options": [
      "A. Cabin entry, tail cone, and baggage lighting.",
      "B. Cockpit flood, cabin (indirect), tail cone, and battery compartment.",
      "C. Cabin entry, tail cone, cockpit flood, and baggage lighting.",
      "D. Cockpit flood, cabin flood, and baggage lighting."
    ],
    "answer": "A – Cabin entry, tail cone, and baggage lighting",
    "explanation": "These lights are on hot/battery‑direct circuits so they can be turned on with **BATT and GEN switches OFF**, allowing access and servicing without energizing the rest of the aircraft electrical system."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 16,
    "prompt": "An illuminated white AHRS AUX PWR 1/2 annunciator indicates:",
    "options": [
      "A. The AHRS system is now powered through the AVN bus.",
      "B. Indicates the AHRS is being powered by the AHRS auxiliary battery.",
      "C. Indicates a condition that requires immediate attention.",
      "D. Indicates a partial failure of the AHRS system."
    ],
    "answer": "B – Indicates the AHRS is being powered by the AHRS auxiliary battery",
    "explanation": "The white **AHRS AUX PWR 1–2** annunciator means the respective AHRS is drawing power from the **auxiliary battery pack** in the right nose compartment instead of the main DC system."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 17,
    "prompt": "If the battery voltage indicates 24 volts prior to engine start:",
    "options": [
      "A. This is a low battery and must be charged to 28 volts.",
      "B. The GPU must be used for starting.",
      "C. 24 volts is the minimum voltage required.",
      "D. Voltage is excessive and could damage the starter."
    ],
    "answer": "C – 24 volts is the minimum voltage required",
    "explanation": "The manual states that prior to start the battery voltage should read **24 V minimum** (for either NiCad or lead‑acid); less than 24 V requires maintenance."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 18,
    "prompt": "During a DC volts and amps test:",
    "options": [
      "A. The operating generator should indicate 24 volts.",
      "B. When turning the right generator off, the left amp load should double.",
      "C. The GEN OFF L/R should illuminate.",
      "D. Is required to make sure the emergency power supply is supplying power to the aircraft."
    ],
    "answer": "B – When turning the right generator off, the left amp load should double",
    "explanation": "In the DC volts/amps test, turning one generator **OFF** should cause the other generator’s ammeter reading to **double**, confirming proper load sharing and intact 225‑amp current limiters; the operating generator should show about 28.5 V, not 24 V."
  },
  {
    "chapter": "Chapter 2 – Electrical Power Systems",
    "number": 19,
    "prompt": "Concerning starting limitations, which is the correct statement?",
    "options": [
      "A. Three engine starts per hour is allowed.",
      "B. A generator assisted start counts as one battery count.",
      "C. If four or more battery starts are performed in one hour, the battery must be allowed to cool for 30 minutes.",
      "D. There are no starter limitations when using a GPU."
    ],

    const chapterEl = document.getElementById("question-chapter");
    const metaEl = document.getElementById("question-meta");
    const questionTextEl = document.getElementById("question-text");
    const optionsListEl = document.getElementById("options-list");
    const answerPillEl = document.getElementById("answer-pill");
    const answerMainEl = document.getElementById("answer-main");
    const answerExplanationEl = document.getElementById("answer-explanation");
    const badgeCountEl = document.getElementById("badge-count");
    const statusTextEl = document.getElementById("status-text");

    const btnNext = document.getElementById("btn-next");
    const btnShow = document.getElementById("btn-show");
    const deckSelect = document.getElementById("deck-select");

    let currentIndex = null;
    let seenCount = 0;
    let currentDeck = "all";

    function getActiveQuestions() {
      if (currentDeck === "req") {
        return questions.filter((q) => q.chapter.startsWith("Required Knowledge"));
      }
      if (currentDeck === "ch2") {
        return questions.filter((q) => q.chapter.startsWith("Chapter 2"));
      }
      if (currentDeck === "ch5") {
        return questions.filter((q) => q.chapter.startsWith("Chapter 5"));
      }
      if (currentDeck === "ch6") {
        return questions.filter((q) => q.chapter.startsWith("Chapter 6"));
      }
      if (currentDeck === "ch7") {
        return questions.filter((q) => q.chapter.startsWith("Chapter 7"));
      }
      if (currentDeck === "ch8") {
        return questions.filter((q) => q.chapter.startsWith("Chapter 8"));
      }
      return questions;
    }

    function renderQuestion(q) {
      chapterEl.textContent = q.chapter;
      metaEl.textContent = `Question ${q.number}`;

      const promptHtml = q.prompt;
      questionTextEl.textContent = promptHtml;

      optionsListEl.innerHTML = "";
      q.options.forEach((opt) => {
        const li = document.createElement("li");
        const span = document.createElement("span");
        span.textContent = opt;
        li.appendChild(span);
        optionsListEl.appendChild(li);
      });
    }

    function hideAnswer() {
      answerPillEl.textContent = "Hidden";
      answerMainEl.textContent = "Press “Show Answer” when you’re ready.";
      answerExplanationEl.textContent = "";
    }

    function showAnswer() {
      if (currentIndex === null) return;
      const active = getActiveQuestions();
      const q = active[currentIndex];
      answerPillEl.textContent = "Revealed";
      answerMainEl.textContent = q.answer;
      answerExplanationEl.textContent = q.explanation;
    }

    function nextQuestion() {
      const active = getActiveQuestions();
      if (!active.length) return;
      currentIndex = Math.floor(Math.random() * active.length);
      const q = active[currentIndex];
      renderQuestion(q);
      hideAnswer();
      seenCount += 1;
      updateStatus();
    }

    function updateStatus() {
      const active = getActiveQuestions();
      badgeCountEl.textContent = `${active.length} cards`;
      statusTextEl.textContent = `${seenCount} / ${active.length} cards reviewed this session.`;
    }

    btnNext.addEventListener("click", nextQuestion);
    btnShow.addEventListener("click", showAnswer);

    deckSelect.addEventListener("change", () => {
      currentDeck = deckSelect.value;
      currentIndex = null;
      seenCount = 0;
      // Reset question/answer text to prompt the user
      chapterEl.textContent = "Ready";
      metaEl.textContent = "\u00a0";
      questionTextEl.innerHTML =
        'Deck changed. Click <span class="question-highlight">Next Question</span> to start.';
      optionsListEl.innerHTML = "";
      hideAnswer();
      updateStatus();
    });

    // Initial state
    updateStatus();
  </script>
